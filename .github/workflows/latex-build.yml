name: Build LaTeX Document
on:
  push:
    branches:
      - main # Chạy mỗi khi bạn push code lên branch main

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex # Thay bằng tên file chính của bạn
          # Nếu có nhiều file hoặc cần compile nhiều lần (bibtex), dùng:
          # args: "-pdf -interaction=nonstopmode -halt-on-error"

      - name: Upload PDF to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Output
          path: devops_MinhTri.pdf # Tên file PDF sau khi build xong
